<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Turma Connect</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060410;
      --glass: rgba(20, 10, 50, 0.55);
      --glass2: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --border-h: rgba(160,100,255,0.55);
      --purple: #8b5cf6;
      --purple2: #a78bfa;
      --purple3: #c084fc;
      --text: #ede9f8;
      --muted: #6b5f8a;
      --danger: #f43f5e;
      --glow: 0 0 60px rgba(139,92,246,0.3);
      --card-r: 22px;
    }

    html, body {
      height: 100%;
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ══ GIF BACKGROUND ══ */
    #bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0.45;
      filter: saturate(1.4) hue-rotate(10deg);
    }

    #bg-overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 80%, rgba(80,20,180,0.35) 0%, rgba(6,4,16,0.85) 70%);
      z-index: 1;
    }

    /* ══ PARTÍCULAS ══ */
    #particles {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 2;
      overflow: hidden;
      width: 100vw; height: 100vh;
    }
    .particle {
      position: absolute; border-radius: 50%;
      background: rgba(160,100,255,0.6);
      animation: particleDrift linear infinite;
    }
    @keyframes particleDrift {
      0%   { transform: translateY(110vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.5; }
      100% { transform: translateY(-30px) scale(1); opacity: 0; }
    }

    /* ══ GLASS ══ */
    .glass {
      background: var(--glass);
      backdrop-filter: blur(28px) saturate(1.5);
      -webkit-backdrop-filter: blur(28px) saturate(1.5);
      border: 1px solid rgba(160,100,255,0.18);
      border-radius: var(--card-r);
      box-shadow: var(--glow), inset 0 1px 0 rgba(255,255,255,0.07), 0 30px 80px rgba(0,0,0,0.5);
    }

    .hidden { display: none !important; }

    /* ══ INPUTS ══ */
    .input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      outline: none;
      margin-bottom: 14px;
      transition: all 0.35s cubic-bezier(.34,1.2,.64,1);
    }
    .input:focus {
      border-color: var(--border-h);
      background: rgba(139,92,246,0.1);
      box-shadow: 0 0 0 3px rgba(139,92,246,0.15), 0 0 20px rgba(139,92,246,0.1);
      transform: translateY(-1px);
    }
    .input::placeholder { color: var(--muted); }
    textarea.input { resize: vertical; min-height: 90px; }

    /* ══ BOTÕES ══ */
    .btn {
      padding: 14px 24px;
      border: none; border-radius: 12px;
      font-family: 'Sora', sans-serif;
      font-size: 14px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.5px;
      transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
      position: relative; overflow: hidden;
    }
    .btn::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.2) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 0.6s;
    }
    .btn:hover::after { transform: translateX(100%); }
    .btn-primary {
      background: linear-gradient(135deg, #9333ea, #6d28d9, #7c3aed);
      background-size: 200% auto;
      color: #fff;
      box-shadow: 0 4px 25px rgba(139,92,246,0.45), inset 0 1px 0 rgba(255,255,255,0.15);
      animation: gradShiftBtn 4s linear infinite;
    }
    @keyframes gradShiftBtn {
      0%   { background-position: 0% center; }
      100% { background-position: 200% center; }
    }
    .btn-primary:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 10px 40px rgba(139,92,246,0.65), inset 0 1px 0 rgba(255,255,255,0.15);
    }
    .btn-ghost {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-ghost:hover { border-color: var(--border-h); background: rgba(139,92,246,0.08); transform: translateY(-1px); }
    .btn-danger {
      background: rgba(244,63,94,0.1);
      border: 1px solid rgba(244,63,94,0.25);
      color: var(--danger);
    }
    .btn-danger:hover { background: rgba(244,63,94,0.2); transform: translateY(-1px); }
    .btn-sm { padding: 7px 14px; font-size: 12px; border-radius: 9px; }
    .btn-full { width: 100%; }
    .btn:active { transform: scale(0.95) !important; }
    .label { font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 7px; display: block; letter-spacing: 0.5px; text-transform: uppercase; }

    /* ══ TOAST ══ */
    #toast {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(120px);
      background: rgba(25,12,55,0.97);
      border: 1px solid rgba(160,100,255,0.4);
      color: var(--text); padding: 13px 28px;
      border-radius: 14px; font-size: 13px; font-weight: 500;
      z-index: 9999;
      transition: transform 0.45s cubic-bezier(.34,1.56,.64,1), opacity 0.3s;
      backdrop-filter: blur(20px);
      white-space: nowrap;
      box-shadow: 0 0 40px rgba(139,92,246,0.35);
      opacity: 0;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ══ MODAL ══ */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      z-index: 100;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      animation: fadeBg .25s ease;
    }
    .modal { width: 100%; max-width: 430px; padding: 30px; animation: modalPop .4s cubic-bezier(.34,1.56,.64,1); }
    .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; }
    @keyframes fadeBg { from { opacity: 0; } to { opacity: 1; } }
    @keyframes modalPop {
      from { opacity: 0; transform: scale(.8) translateY(30px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ══ AUTH PAGE ══ */
    #page-auth {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      position: relative; z-index: 3;
    }

    .auth-card {
      width: 100%; max-width: 400px;
      padding: 44px 38px;
      animation: authCardIn 0.9s cubic-bezier(.34,1.2,.64,1) both;
      position: relative;
    }

    /* Brilho nas bordas do card */
    .auth-card::before {
      content: '';
      position: absolute; inset: -1px;
      border-radius: calc(var(--card-r) + 1px);
      background: linear-gradient(135deg, rgba(160,100,255,0.4), transparent 40%, rgba(100,50,200,0.3));
      z-index: -1;
      animation: borderGlow 4s ease-in-out infinite;
    }
    @keyframes borderGlow {
      0%,100% { opacity: 0.6; }
      50%      { opacity: 1; }
    }

    @keyframes authCardIn {
      from { opacity: 0; transform: translateY(60px) scale(0.9); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Logo */
    .auth-logo { text-align: center; margin-bottom: 30px; }
    .logo-img {
      width: 220px; height: auto; display: block; margin: 0 auto 10px;
      filter: drop-shadow(0 0 28px rgba(100,120,255,0.7));
      animation: logoFloat 3.5s ease-in-out infinite;
    }
    @keyframes logoFloat {
      0%,100% { transform: translateY(0) scale(1); filter: drop-shadow(0 0 28px rgba(100,120,255,0.7)); }
      50%      { transform: translateY(-8px) scale(1.04); filter: drop-shadow(0 0 42px rgba(140,100,255,0.95)); }
    }
    .auth-logo p { font-size: 13px; color: var(--muted); margin-top: 4px; font-weight: 400; }

    /* Tabs */
    .auth-tabs {
      display: flex;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 4px; margin-bottom: 28px; gap: 4px;
    }
    .auth-tab {
      flex: 1; padding: 10px; border: none; border-radius: 10px;
      background: transparent; color: var(--muted);
      font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.35s cubic-bezier(.34,1.36,.64,1);
    }
    .auth-tab.active {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: #fff;
      box-shadow: 0 2px 18px rgba(139,92,246,0.5);
      transform: scale(1.02);
    }

    /* Form panels */
    .auth-form-panel { display: none; flex-direction: column; gap: 6px; }
    .auth-form-panel.active {
      display: flex;
      animation: panelSlide .4s cubic-bezier(.34,1.2,.64,1);
    }
    @keyframes panelSlide {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .auth-form-panel.active > * { animation: fadeUp .4s both; }
    .auth-form-panel.active > *:nth-child(1) { animation-delay: .05s; }
    .auth-form-panel.active > *:nth-child(2) { animation-delay: .12s; }
    .auth-form-panel.active > *:nth-child(3) { animation-delay: .19s; }
    .auth-form-panel.active > *:nth-child(4) { animation-delay: .26s; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .auth-footer { text-align: center; margin-top: 20px; font-size: 12px; color: var(--muted); }

    /* ══ DASHBOARD ══ */
    #page-dashboard {
      min-height: 100vh;
      position: relative; z-index: 3;
      max-width: 780px; margin: 0 auto;
      padding: 0 16px 100px;
    }
    #page-dashboard.entering { animation: dashIn .7s cubic-bezier(.34,1.2,.64,1) both; }
    @keyframes dashIn {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Topbar */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 0 16px;
      border-bottom: 1px solid rgba(139,92,246,0.15);
      margin-bottom: 26px; gap: 12px;
      animation: fadeDown .5s .1s both;
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
    .topbar-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, #9333ea, #6d28d9);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; font-weight: 800; flex-shrink: 0;
      box-shadow: 0 0 0 2px rgba(139,92,246,0.4);
      animation: avatarPulse 3s ease-in-out infinite;
      cursor: default; transition: transform 0.3s;
    }
    .topbar-avatar:hover { transform: scale(1.12) rotate(8deg); }
    @keyframes avatarPulse {
      0%,100% { box-shadow: 0 0 0 2px rgba(139,92,246,0.4); }
      50%      { box-shadow: 0 0 0 6px rgba(139,92,246,0.1), 0 0 20px rgba(139,92,246,0.3); }
    }
    .topbar-name { font-size: 15px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .topbar-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .logout-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--muted); padding: 9px 16px;
      border-radius: 10px; cursor: pointer;
      font-size: 12px; font-family: 'Sora', sans-serif; font-weight: 600;
      transition: all 0.25s;
    }
    .logout-btn:hover { border-color: var(--border-h); color: var(--text); transform: translateY(-1px); }

    /* Status badge removed */

    /* Notification badge */
    .notification-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 22px; height: 22px; border-radius: 50%;
      background: linear-gradient(135deg, #f43f5e, #e11d48);
      color: #fff; font-size: 10px; font-weight: 700;
      box-shadow: 0 0 12px rgba(244,63,94,0.5);
      animation: notifPulse 2s ease-in-out infinite;
    }
    @keyframes notifPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.15);} }

    /* Cards de publicação */
    .publish-card {
      padding: 24px; margin-bottom: 26px;
      animation: fadeUp .5s .2s both;
      transition: box-shadow .3s;
    }
    .publish-card:focus-within {
      box-shadow: 0 0 0 1px rgba(139,92,246,0.4), var(--glow), inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .publish-card h3 { font-size: 14px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; letter-spacing: 0.3px; }

    /* Type chips */
    .type-selector { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .type-chip {
      padding: 6px 14px; border-radius: 999px;
      font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border);
      background: transparent; color: var(--muted);
      font-family: 'Sora', sans-serif;
      transition: all .3s cubic-bezier(.34,1.36,.64,1);
    }
    .type-chip:hover { transform: translateY(-2px); border-color: var(--border-h); color: var(--text); }
    .type-chip.active {
      background: rgba(139,92,246,0.2);
      border-color: rgba(160,100,255,0.5);
      color: var(--purple2);
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 4px 16px rgba(139,92,246,0.25);
    }

    .publish-actions { display: flex; gap: 10px; margin-top: 14px; }

    /* Filter bar */
    .filter-bar {
      display: flex; gap: 8px; margin-bottom: 22px; flex-wrap: wrap;
      animation: fadeUp .5s .3s both;
    }
    .filter-chip {
      padding: 7px 16px; border-radius: 999px;
      font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border);
      background: transparent; color: var(--muted);
      font-family: 'Sora', sans-serif;
      transition: all .3s cubic-bezier(.34,1.36,.64,1);
      animation: fadeUp .4s both;
    }
    .filter-chip:nth-child(1){animation-delay:.05s}
    .filter-chip:nth-child(2){animation-delay:.10s}
    .filter-chip:nth-child(3){animation-delay:.15s}
    .filter-chip:nth-child(4){animation-delay:.20s}
    .filter-chip:nth-child(5){animation-delay:.25s}
    .filter-chip:nth-child(6){animation-delay:.30s}
    .filter-chip:hover { transform: translateY(-2px); border-color: var(--border-h); color: var(--text); }
    .filter-chip.active {
      background: rgba(139,92,246,0.18);
      border-color: rgba(160,100,255,0.45);
      color: var(--purple2);
      transform: translateY(-2px);
      box-shadow: 0 4px 14px rgba(139,92,246,0.22);
    }

    /* Notice cards */
    #notices-list { display: flex; flex-direction: column; gap: 14px; }
    .notice-card {
      padding: 22px; position: relative; overflow: hidden;
      transition: border-color .3s, transform .3s, box-shadow .3s;
      cursor: default;
    }
    .notice-card::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: linear-gradient(180deg, var(--purple3), #6d28d9);
      opacity: 0; transition: opacity .3s;
      border-radius: 3px 0 0 3px;
    }
    .notice-card:hover {
      border-color: rgba(160,100,255,0.35);
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(139,92,246,0.2), inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .notice-card:hover::before { opacity: 1; }
    .notice-card.card-enter { animation: cardEnter .5s cubic-bezier(.34,1.2,.64,1) both; }
    @keyframes cardEnter {
      from { opacity: 0; transform: translateY(24px) scale(.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .notice-card.card-exit { animation: cardExit .3s ease forwards; }
    @keyframes cardExit {
      to { opacity: 0; transform: scale(.93) translateY(-10px); max-height: 0; padding: 0; margin: 0; }
    }
    .notice-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
    .notice-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .notice-author { font-size: 12px; font-weight: 700; color: var(--purple2); text-transform: uppercase; letter-spacing: 0.5px; }
    .notice-time { font-size: 11px; color: var(--muted); }
    .notice-type-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 999px;
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.6px; text-transform: uppercase;
      margin-top: 6px; transition: transform .2s;
    }
    .notice-card:hover .notice-type-pill { transform: scale(1.06); }
    .pill-aviso    { background: rgba(251,191,36,.1); color: #fbbf24; border: 1px solid rgba(251,191,36,.25); }
    .pill-prova    { background: rgba(244,63,94,.1); color: #f43f5e; border: 1px solid rgba(244,63,94,.25); }
    .pill-trabalho { background: rgba(34,197,94,.1); color: #22c55e; border: 1px solid rgba(34,197,94,.25); }
    .pill-atividade{ background: rgba(139,92,246,.1); color: var(--purple2); border: 1px solid rgba(139,92,246,.25); }
    .notice-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .notice-body { font-size: 14px; line-height: 1.7; color: #ccc4e0; }

    /* Books table */
    .books-table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 13px; }
    .books-table th, .books-table td { padding: 11px 14px; border-bottom: 1px solid rgba(255,255,255,0.07); text-align: left; }
    .books-table th { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .08em; font-weight: 600; }
    .books-table tbody tr:hover { background: rgba(255,255,255,.03); }

    /* Deadline */
    .publish-deadline { margin-top: 12px; }
    .notice-deadline {
      margin-top: 10px; font-size: 11px; color: var(--text);
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 11px; border: 1px solid var(--border);
      border-radius: 999px; background: rgba(255,255,255,0.04);
    }
    .notice-deadline.overdue { color: #fca5a5; border-color: rgba(244,63,94,.35); background: rgba(244,63,94,.1); }

    /* Empty state */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); animation: fadeUp .5s both; }
    .empty-state .emoji { font-size: 54px; display: block; margin-bottom: 14px; animation: emptyBounce 2.5s ease-in-out infinite; }
    @keyframes emptyBounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-12px);} }
    .empty-state p { font-size: 14px; }

    /* Section header */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; margin-top: 32px; gap: 10px; animation: fadeUp .5s .25s both; }
    .section-title { font-size: 17px; font-weight: 800; display: flex; align-items: center; gap: 8px; letter-spacing: -0.3px; }
    .count-badge { background: rgba(139,92,246,0.2); color: var(--purple2); padding: 2px 9px; border-radius: 999px; font-size: 11px; font-weight: 700; }
    .count-badge.bump { animation: badgeBump .4s cubic-bezier(.34,1.56,.64,1); }
    @keyframes badgeBump { 0%{transform:scale(1);} 40%{transform:scale(1.5);} 100%{transform:scale(1);} }

    /* Suggestions panel */
    .suggestions-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 10px; }

    /* Activity marker */
    .activity-marker {
      display: flex; align-items: center; gap: 12px;
      margin-top: 16px; font-size: 13px; color: var(--text);
      border: 1px solid rgba(139,92,246,0.18);
      background: rgba(255,255,255,0.03);
      padding: 12px 14px; border-radius: 12px;
      transition: background .2s, border-color .2s;
    }
    .activity-marker input { width: 18px; height: 18px; accent-color: var(--purple); cursor: pointer; flex-shrink: 0; }
    .activity-marker span { font-weight: 600; line-height: 1.3; }
    .activity-marker.done { border-color: rgba(16,185,129,.35); background: rgba(16,185,129,.1); color: #a7f3d0; }
    .notice-card.done-activity { border-color: rgba(16,185,129,.35); }
    .notice-card.done-activity .notice-type-pill { background: rgba(16,185,129,.1); color: #10b981; border-color: rgba(16,185,129,.25); }

    /* Ripple */
    .ripple {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transform: scale(0); animation: rippleAnim .6s linear;
      pointer-events: none;
    }
    @keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }

    /* ══ CONFETTI BURST ══ */
    .confetti-particle {
      position: fixed;
      width: 8px; height: 8px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 9999;
      animation: confettiFly var(--dur, 1s) var(--delay, 0s) cubic-bezier(.23,1,.32,1) both;
    }
    @keyframes confettiFly {
      0%   { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translate(var(--tx,0px), var(--ty,120px)) rotate(var(--rot,360deg)) scale(0.4); opacity: 0; }
    }

    /* Animação do card ao concluir */
    .notice-card.completing {
      animation: cardComplete .5s cubic-bezier(.34,1.56,.64,1) both !important;
    }
    @keyframes cardComplete {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.035) translateY(-3px); box-shadow: 0 0 0 2px rgba(16,185,129,.5), 0 12px 40px rgba(16,185,129,.25); }
      100% { transform: scale(1) translateY(0); }
    }

    /* Checkmark pop */
    .activity-marker input[type=checkbox] {
      transition: transform .2s cubic-bezier(.34,1.56,.64,1);
    }
    .activity-marker input[type=checkbox]:checked {
      animation: checkPop .4s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes checkPop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.6) rotate(-10deg); }
      100% { transform: scale(1) rotate(0); }
    }

    /* Banner "Concluída!" que aparece e some */
    .done-banner {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff;
      font-family: 'Sora', sans-serif;
      font-size: 22px; font-weight: 800;
      padding: 18px 40px;
      border-radius: 18px;
      box-shadow: 0 0 60px rgba(16,185,129,.5);
      z-index: 9999;
      pointer-events: none;
      letter-spacing: 0.5px;
      animation: bannerPop .7s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes bannerPop {
      0%   { transform: translate(-50%,-50%) scale(0) rotate(-8deg); opacity: 0; }
      50%  { transform: translate(-50%,-50%) scale(1.08) rotate(2deg); opacity: 1; }
      70%  { transform: translate(-50%,-50%) scale(1) rotate(0); opacity: 1; }
      100% { transform: translate(-50%,-50%) scale(1) rotate(0); opacity: 1; }
    }

    /* Skeleton */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,.03) 25%, rgba(255,255,255,.09) 50%, rgba(255,255,255,.03) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { from{background-position:200% 0;} to{background-position:-200% 0;} }

    @keyframes shake {
      0%,100%{transform:translateX(0) scale(1);}
      20%{transform:translateX(-9px) scale(1.01);}
      40%{transform:translateX(9px);}
      60%{transform:translateX(-5px);}
      80%{transform:translateX(5px);}
    }
    @keyframes authOut { to { opacity: 0; transform: scale(.94) translateY(-12px); } }

    /* Admin tabs */
    .admin-tabs { display: flex; background: rgba(0,0,0,0.35); border: 1px solid var(--border); border-radius: 14px; padding: 4px; margin-bottom: 24px; gap: 4px; }
    .admin-tab { flex: 1; padding: 10px; border: none; border-radius: 12px; background: transparent; color: var(--muted); font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .3s cubic-bezier(.34,1.36,.64,1); }
    .admin-tab.active { background: linear-gradient(135deg, #7c3aed, #6d28d9); color: #fff; box-shadow: 0 2px 16px rgba(139,92,246,0.45); transform: scale(1.02); }
    .admin-form-panel { display: none; }
    .admin-form-panel.active { display: block; animation: panelSlide .4s cubic-bezier(.34,1.2,.64,1) both; }
    .panel-slide-in { animation: panelSlide .35s cubic-bezier(.34,1.2,.64,1) both; }

    @media(max-width:480px){
      .auth-card { padding: 28px 20px; }
      .logo-img { width: 190px; }
      .publish-actions { flex-direction: column; }
      .notice-actions .btn-sm span { display: none; }
      .filter-bar { gap: 6px; }
      .filter-chip { padding: 6px 12px; font-size: 11px; }
      #page-dashboard { padding: 0 12px 100px; }
      .topbar { padding: 16px 0 12px; }
    }
    /* Garantir que tudo aparece em mobile */
    @media(max-width:768px){
      #bg-video { opacity: 0.5; }
      .particle { opacity: 0.7 !important; }
    }
  </style>
</head>

  <script>
    /* ══ SUPABASE ══ */
    const SUPABASE_URL = "https://nxdknoqzclpmvhxnfmfx.supabase.co";

      "Content-Type": "application/json",
      "apikey": SUPABASE_ANON,

      "Prefer": "return=representation"
    };

    async function sbFetch(path, options = {}) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
        ...options,
        headers: { ...SB_HEADERS, ...(options.headers || {}) }
      });
      if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.message || `Erro ${res.status}`); }
      if (res.status === 204) return null;
      return res.json();
    }

    const DB = {
      async findUser(name) { const r = await sbFetch(`users?name=ilike.${encodeURIComponent(name)}&limit=1`); return r[0]||null; },
      async createUser(name, pass) { const r = await sbFetch("users",{method:"POST",body:JSON.stringify({name,pass})}); return r[0]; },
      async getNotices() { return sbFetch("notices?order=created_at.desc"); },
      async createNotice(text,type,author,dueDate=null) { const r = await sbFetch("notices",{method:"POST",body:JSON.stringify({text,type,author,due_date:dueDate||null})}); return r[0]; },
      async updateNotice(id,text) { const r = await sbFetch(`notices?id=eq.${id}`,{method:"PATCH",body:JSON.stringify({text,edited:true})}); return r[0]; },
      async deleteNotice(id) { return sbFetch(`notices?id=eq.${id}`,{method:"DELETE"}); },
      async getBooks() { return sbFetch("books"); },
      async createBook(day,subject,bookName) { const r = await sbFetch("books",{method:"POST",body:JSON.stringify({day_of_week:day,subject,book_name:bookName})}); return r[0]; },
      async deleteBook(id) { return sbFetch(`books?id=eq.${id}`,{method:"DELETE"}); },
      async getSuggestions() { return sbFetch("suggestions?order=created_at.desc"); },
      async createSuggestion(message,author) { const r = await sbFetch("suggestions",{method:"POST",body:JSON.stringify({message,author})}); return r[0]; },
      async deleteSuggestion(id) { return sbFetch(`suggestions?id=eq.${id}`,{method:"DELETE"}); },
      getSession() { return JSON.parse(localStorage.getItem("tc_session")||"null"); },
      saveSession(u) { localStorage.setItem("tc_session",JSON.stringify(u)); },
      clearSession() { localStorage.removeItem("tc_session"); }
    };

    const ADMIN_USERS = ["representante","admin","monitor","delegado"];
    let currentUser=null,notices=[],books=[],suggestions=[],currentFilter="todos",editingId=null,selectedType="aviso";

    /* Partículas */
    (function(){
      const c=document.getElementById("particles");
      for(let i=0;i<40;i++){
        const p=document.createElement("div"); p.className="particle";
        const sz=Math.random()*5+2;
        p.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;`+
          `animation-duration:${Math.random()*14+8}s;animation-delay:${Math.random()*-22}s;`+
          `opacity:${Math.random()*.6+.2}`;
        c.appendChild(p);
      }
    })();

    /* Ripple */
    document.addEventListener("click",e=>{
      const btn=e.target.closest(".btn"); if(!btn) return;
      const r=document.createElement("span"); r.className="ripple";
      const rect=btn.getBoundingClientRect();
      const sz=Math.max(rect.width,rect.height)*2;
      r.style.cssText=`width:${sz}px;height:${sz}px;left:${e.clientX-rect.left-sz/2}px;top:${e.clientY-rect.top-sz/2}px`;
      btn.appendChild(r); r.addEventListener("animationend",()=>r.remove());
    });

    window.addEventListener("DOMContentLoaded",()=>{
      const s=DB.getSession(); if(s) loginUser(s.name);
      ["login-name","login-pass"].forEach(id=>document.getElementById(id).addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();}));
      ["reg-name","reg-pass","reg-pass2"].forEach(id=>document.getElementById(id).addEventListener("keydown",e=>{if(e.key==="Enter")doRegister();}));
    });

    function switchTab(tab){
      document.querySelectorAll(".auth-tab").forEach((el,i)=>el.classList.toggle("active",(i===0)===(tab==="login")));
      document.getElementById("tab-login").classList.toggle("active",tab==="login");
      document.getElementById("tab-register").classList.toggle("active",tab!=="login");
    }
    function shakeCard(){
      const c=document.querySelector(".auth-card");
      c.style.animation="none"; c.offsetHeight;
      c.style.animation="shake .4s ease";
      c.addEventListener("animationend",()=>c.style.animation="",{once:true});
    }

    async function doRegister(){
      const name=document.getElementById("reg-name").value.trim();
      const pass=document.getElementById("reg-pass").value;
      const pass2=document.getElementById("reg-pass2").value;
      if(!name){shakeCard();return toast("Digite um nome.");}
      if(name.length<2){shakeCard();return toast("Nome muito curto.");}
      if(pass.length<4){shakeCard();return toast("Senha com ao menos 4 caracteres.");}
      if(pass!==pass2){shakeCard();return toast("As senhas não conferem.");}
      setBtnLoading("reg-btn",true,"Criando conta...");
      try{
        const existing=await DB.findUser(name);
        if(existing){shakeCard();return toast("Esse nome já está em uso.");}
        await DB.createUser(name,pass);
        toast("Conta criada! Faça login. ✅"); switchTab("login");
        document.getElementById("login-name").value=name;
      }catch(e){shakeCard();toast("Erro ao criar conta: "+e.message);}
      finally{setBtnLoading("reg-btn",false,"Criar conta");}
    }

    async function doLogin(){
      const name=document.getElementById("login-name").value.trim();
      const pass=document.getElementById("login-pass").value;
      if(!name||!pass){shakeCard();return toast("Preencha todos os campos.");}
      setBtnLoading("login-btn",true,"Entrando...");
      try{
        const user=await DB.findUser(name);
        if(!user||user.pass!==pass){shakeCard();return toast("Nome ou senha incorretos.");}
        loginUser(user.name);
      }catch(e){shakeCard();toast("Erro de conexão: "+e.message);setConnBadge(false);}
      finally{setBtnLoading("login-btn",false,"Entrar");}
    }

    function loginUser(name){
      const isAdmin=ADMIN_USERS.some(a=>a.toLowerCase()===name.toLowerCase());
      currentUser={name,isAdmin}; DB.saveSession(currentUser);
      document.getElementById("dash-name").textContent=name;
      document.getElementById("dash-role").textContent=isAdmin?"Representante (Admin)":"Aluno";
      document.getElementById("dash-avatar").textContent=name[0].toUpperCase();
      document.getElementById("admin-panel").classList.toggle("hidden",!isAdmin);
      document.getElementById("suggestions-header-panel").classList.remove("hidden");
      const auth=document.getElementById("page-auth");
      const dash=document.getElementById("page-dashboard");
      auth.style.animation="authOut .35s ease forwards";
      auth.addEventListener("animationend",()=>{
        auth.classList.add("hidden"); auth.style.animation="";
        dash.classList.remove("hidden"); dash.classList.add("entering");
        dash.addEventListener("animationend",()=>dash.classList.remove("entering"),{once:true});
      },{once:true});
      showSkeletons(); loadNotices(); loadBooks(); loadSuggestions();
    }

    function doLogout(){
      const dash=document.getElementById("page-dashboard");
      dash.style.animation="authOut .3s ease forwards";
      dash.addEventListener("animationend",()=>{
        dash.classList.add("hidden"); dash.style.animation="";
        currentUser=null; DB.clearSession();
        const auth=document.getElementById("page-auth");
        auth.classList.remove("hidden");
        auth.style.animation="authCardIn .5s cubic-bezier(.34,1.36,.64,1) both";
        auth.addEventListener("animationend",()=>auth.style.animation="",{once:true});
        document.getElementById("login-pass").value="";
        toast("Até logo! 👋");
      },{once:true});
    }

    async function loadNotices(){
      try{ notices=await DB.getNotices(); setConnBadge(true); renderNotices(true); }
      catch(e){ setConnBadge(false); toast("Erro ao carregar avisos."); document.getElementById("notices-list").innerHTML=`<div class="empty-state"><span class="emoji">⚠️</span><p>Não foi possível carregar. Verifique sua conexão.</p></div>`; }
    }
    async function loadBooks(){ try{ books=await DB.getBooks(); renderBooks(); if(currentFilter==="livros") renderNotices(false); }catch(e){ toast("Erro ao carregar livros."); } }
    async function loadSuggestions(){ try{ suggestions=await DB.getSuggestions(); renderSuggestions(); updateNotificationBadge(); }catch(e){ toast("Erro ao carregar sugestões."); } }

    function showSkeletons(){
      document.getElementById("notices-list").innerHTML=[1,2,3].map(()=>`
        <div class="glass" style="padding:22px;border-radius:22px">
          <div style="display:flex;gap:10px;align-items:center;margin-bottom:14px">
            <div class="skeleton" style="width:80px;height:12px"></div>
            <div class="skeleton" style="width:50px;height:12px"></div>
          </div>
          <div class="skeleton" style="width:100%;height:12px;margin-bottom:8px"></div>
          <div class="skeleton" style="width:65%;height:12px"></div>
        </div>`).join("");
    }

    function selectType(el){
      document.querySelectorAll(".type-chip").forEach(c=>c.classList.remove("active"));
      el.classList.add("active"); selectedType=el.dataset.type; toggleDeadlineInput();
    }

    async function publishNotice(){
      if(!currentUser?.isAdmin) return;
      const text=document.getElementById("pub-text").value.trim();
      const dueDate=document.getElementById("pub-deadline").value;
      const effectiveDueDate=requiresDeadline(selectedType)?dueDate:null;
      if(!text) return toast("Escreva algo antes de publicar.");
      if(requiresDeadline(selectedType)&&!dueDate) return toast("Informe a data de término.");
      setBtnLoading("pub-btn",true,"Publicando...");
      try{
        const notice=await DB.createNotice(text,selectedType,currentUser.name,effectiveDueDate||null);
        notices.unshift(notice); renderNotices(true); clearPublish(); toast("Publicado! 🎉"); bumpCount();
      }catch(e){ toast("Erro ao publicar: "+e.message); }
      finally{ setBtnLoading("pub-btn",false,"Publicar"); }
    }

    function clearPublish(){ document.getElementById("pub-text").value=""; document.getElementById("pub-deadline").value=""; }

    function switchAdminTab(tab){
      document.querySelectorAll(".admin-tab").forEach((el,i)=>el.classList.toggle("active",(i===0)===(tab==="publish")));
      document.getElementById("tab-publish").classList.toggle("active",tab==="publish");
      document.getElementById("tab-books").classList.toggle("active",tab!=="publish");
    }

    async function addBook(){
      const day=document.getElementById("book-day").value;
      const subject=document.getElementById("book-subject").value.trim();
      const bookName=document.getElementById("book-name").value.trim();
      if(!subject||!bookName) return toast("Preencha matéria e nome do livro.");
      setBtnLoading("add-book-btn",true,"Adicionando...");
      try{
        const book=await DB.createBook(day,subject,bookName);
        books.push(book); renderBooks();
        if(currentFilter==="livros") renderNotices(false);
        document.getElementById("book-subject").value=""; document.getElementById("book-name").value="";
        toast("Livro adicionado! ✅");
      }catch(e){ toast("Erro ao adicionar livro: "+e.message); }
      finally{ setBtnLoading("add-book-btn",false,"Adicionar Livro"); }
    }

    async function deleteBook(id){
      if(!confirm("Excluir este livro?")) return;
      try{ await DB.deleteBook(id); books=books.filter(b=>b.id!==id); renderBooks(); if(currentFilter==="livros") renderNotices(false); toast("Livro excluído."); }
      catch(e){ toast("Erro ao excluir: "+e.message); }
    }

    function renderBooks(){
      const list=document.getElementById("current-books");
      const days=["segunda","terça","quarta","quinta","sexta","sábado","domingo"];
      if(!books.length){ list.innerHTML=`<div class="empty-state" style="padding:30px 0"><span class="emoji">📚</span><p>Nenhum livro cadastrado.</p></div>`; return; }
      const rows=books.slice().sort((a,b)=>{const d=days.indexOf(a.day_of_week)-days.indexOf(b.day_of_week); return d||a.subject.localeCompare(b.subject,'pt-BR');})
        .map(b=>`<tr><td>${capitalizeDay(b.day_of_week)}</td><td>${esc(b.subject)}</td><td>${esc(b.book_name)}</td><td><button class="btn btn-danger btn-sm" onclick="deleteBook(${b.id})">Excluir</button></td></tr>`).join("");
      list.innerHTML=`<div style="overflow-x:auto;margin-top:16px"><table class="books-table"><thead><tr><th>Dia</th><th>Matéria</th><th>Livro</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`;
    }

    function getDoneActivities(){ if(!currentUser) return {}; try{ return JSON.parse(localStorage.getItem(`tc_done_activities_${currentUser.name.toLowerCase()}`)||"{}")||{}; }catch(e){return{};} }
    function saveDoneActivities(m){ if(!currentUser) return; localStorage.setItem(`tc_done_activities_${currentUser.name.toLowerCase()}`,JSON.stringify(m)); }
    function isActivityDone(id){ return !!getDoneActivities()[id]; }
    /* ══ CONFETTI BURST ══ */
    function launchConfetti(originX, originY) {
      const colors = ['#a78bfa','#c084fc','#10b981','#fbbf24','#f472b6','#60a5fa','#34d399','#f87171'];
      const count = 48;
      for (let i = 0; i < count; i++) {
        const el = document.createElement('div');
        el.className = 'confetti-particle';
        const angle = (360 / count) * i + Math.random() * 15;
        const dist  = 80 + Math.random() * 120;
        const rad   = angle * Math.PI / 180;
        const tx    = Math.cos(rad) * dist;
        const ty    = Math.sin(rad) * dist - 40;
        const dur   = (0.6 + Math.random() * 0.5).toFixed(2);
        const delay = (Math.random() * 0.12).toFixed(2);
        const rot   = (Math.random() * 720 - 360).toFixed(0);
        const size  = (5 + Math.random() * 7).toFixed(0);
        el.style.cssText = `
          left:${originX}px; top:${originY}px;
          width:${size}px; height:${size}px;
          background:${colors[Math.floor(Math.random()*colors.length)]};
          --tx:${tx}px; --ty:${ty}px;
          --dur:${dur}s; --delay:${delay}s;
          --rot:${rot}deg;
          border-radius:${Math.random()>0.5?'50%':'3px'};
        `;
        document.body.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
      }
    }

   function showDoneBanner() {
    const banner = document.createElement("div");

    banner.innerHTML = `
        <span style="font-size:22px;">✅</span>
        <span>Parabéns!</span>
    `;

    banner.style.position = "fixed";

    /* CENTRALIZAÇÃO REAL */
    banner.style.top = "90%";
    banner.style.left = "50%";
    banner.style.transform = "translate(-50%, -50%) scale(0.9)";

    banner.style.display = "flex";
    banner.style.alignItems = "center";
    banner.style.gap = "6px";

    banner.style.padding = "2px 5.5px";

    banner.style.background =
        "linear-gradient(135deg, #a8edea, #fed6e3)";

    banner.style.color = "#333";

    banner.style.fontSize = "16px";
    banner.style.fontWeight = "600";

    banner.style.borderRadius = "16px";

    banner.style.boxShadow =
        "0 12px 30px rgba(0,0,0,0.18)";

    banner.style.zIndex = "9999";

    banner.style.opacity = "0";

    banner.style.transition =
        "all 0.35s ease";

    document.body.appendChild(banner);

    // animação de entrada
    setTimeout(() => {
        banner.style.opacity = "1";
        banner.style.transform =
            "translate(-50%, -50%) scale(1)";
    }, 50);

    // animação de saída
    setTimeout(() => {
        banner.style.opacity = "0";
        banner.style.transform =
            "translate(-50%, -50%) scale(0.9)";
    }, 2200);

    setTimeout(() => {
        banner.remove();
    }, 2600);
}

    function toggleActivityDone(id, checkboxEl) {
      const m = getDoneActivities();
      m[id] = !m[id];
      saveDoneActivities(m);

      if (m[id]) {
        // Pega posição do checkbox pra lançar confete dali
        const rect = checkboxEl ? checkboxEl.getBoundingClientRect() : { left: window.innerWidth/2, top: window.innerHeight/2 };
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;

        // Animação no card
        const card = checkboxEl ? checkboxEl.closest('.notice-card') : null;
        if (card) {
          card.classList.add('completing');
          card.addEventListener('animationend', () => card.classList.remove('completing'), { once: true });
        }

        // Confete e banner
        launchConfetti(cx, cy);
        showDoneBanner();
      }

      renderNotices(false);
    }

    function bumpCount(){ const el=document.getElementById("notices-count"); el.classList.remove("bump"); el.offsetHeight; el.classList.add("bump"); el.addEventListener("animationend",()=>el.classList.remove("bump"),{once:true}); }

    function openEdit(id){ const n=notices.find(x=>x.id===id); if(!n) return; editingId=id; document.getElementById("edit-text").value=n.text; document.getElementById("edit-modal").classList.remove("hidden"); }
    async function saveEdit(){ const text=document.getElementById("edit-text").value.trim(); if(!text) return toast("O texto não pode estar vazio."); try{ const updated=await DB.updateNotice(editingId,text); const idx=notices.findIndex(x=>x.id===editingId); if(idx!==-1) notices[idx]=updated; renderNotices(false); closeModal(); toast("Aviso atualizado ✅"); }catch(e){ toast("Erro ao salvar: "+e.message); } }
    function closeModal(){ const m=document.getElementById("edit-modal"); m.style.animation="fadeBg .2s ease reverse forwards"; m.addEventListener("animationend",()=>{ m.classList.add("hidden"); m.style.animation=""; editingId=null; },{once:true}); }
    async function deleteNotice(id){ if(!confirm("Excluir esta publicação?")) return; const card=document.querySelector(`[data-id="${id}"]`); const doDelete=async()=>{ try{ await DB.deleteNotice(id); notices=notices.filter(x=>x.id!==id); renderNotices(false); toast("Publicação excluída."); bumpCount(); }catch(e){ toast("Erro ao excluir: "+e.message); } }; if(card){ card.classList.add("card-exit"); card.addEventListener("animationend",doDelete,{once:true}); }else doDelete(); }

    function setFilter(el){
      document.querySelectorAll(".filter-chip").forEach(c=>c.classList.remove("active"));
      el.classList.add("active");
      currentFilter=el.dataset.filter;
      // Animate the notices list out then in
      const list=document.getElementById("notices-list");
      list.style.animation="none";
      list.style.opacity="0";
      list.style.transform="translateY(14px)";
      setTimeout(()=>{
        list.style.transition="opacity 0.35s ease, transform 0.35s cubic-bezier(.34,1.2,.64,1)";
        renderNotices(true);
        list.style.opacity="1";
        list.style.transform="translateY(0)";
        setTimeout(()=>{ list.style.transition=""; list.style.opacity=""; list.style.transform=""; },400);
      },80);
    }
    function requiresDeadline(type){ return type==="prova"||type==="trabalho"||type==="atividade"; }

    async function submitSuggestion(){
      const text=document.getElementById("suggestion-text").value.trim();
      if(!text) return toast("Escreva uma sugestão antes de enviar.");
      setBtnLoading("suggest-btn",true,"Enviando...");
      try{ const suggestion=await DB.createSuggestion(text,currentUser.name); suggestions.unshift(suggestion); renderSuggestions(); updateNotificationBadge(); document.getElementById("suggestion-text").value=""; toast("Sugestão enviada! 🙌"); }
      catch(e){ toast("Erro ao enviar sugestão: "+e.message); }
      finally{ setBtnLoading("suggest-btn",false,"Enviar Sugestão"); }
    }
    async function deleteSuggestion(id){ if(!confirm("Remover esta sugestão?")) return; try{ await DB.deleteSuggestion(id); suggestions=suggestions.filter(s=>s.id!==id); renderSuggestions(); updateNotificationBadge(); toast("Sugestão removida."); }catch(e){ toast("Erro ao remover: "+e.message); } }

    function renderSuggestions(){
      const list=document.getElementById("suggestions-list");
      const visible=suggestions.filter(s=>currentUser?.isAdmin||s.author===currentUser?.name);
      if(!visible.length){ list.innerHTML=`<div style="text-align:center;color:var(--muted);padding:14px;font-size:12px">Nenhuma sugestão ainda</div>`; return; }
      list.innerHTML=visible.map(s=>{
        const rel=relativeTime(new Date(s.created_at));
        const canDelete=currentUser?.isAdmin||s.author===currentUser?.name;
        const delBtn=canDelete?`<button class="btn btn-danger btn-sm" onclick="deleteSuggestion(${s.id})">🗑</button>`:"";
        return `<div style="background:rgba(255,255,255,.03);border:1px solid rgba(139,92,246,.18);border-radius:10px;padding:12px;margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px">
            <div><div style="font-size:12px;font-weight:700;color:var(--purple2)">${esc(s.author)}</div><div style="font-size:10px;color:var(--muted)">${rel}</div></div>${delBtn}
          </div>
          <div style="font-size:13px;line-height:1.5;color:var(--text)">${esc(s.message).replace(/\n/g,"<br>")}</div>
        </div>`;
      }).join("");
    }

    function updateNotificationBadge(){
      const badge=document.getElementById("notification-badge");
      if(!currentUser?.isAdmin){ badge.classList.add("hidden"); return; }
      if(suggestions.length>0){ badge.classList.remove("hidden"); badge.textContent=suggestions.length>99?"99+":suggestions.length; }
      else badge.classList.add("hidden");
    }

    function toggleSuggestionsPanel(){
      const content=document.getElementById("suggestions-panel-content");
      const btn=document.getElementById("toggle-suggestions");
      const isHidden=content.style.display==="none";
      content.style.display=isHidden?"block":"none";
      btn.textContent=isHidden?"📋 Fechar":"📋 Ver";
    }

    function toggleDeadlineInput(){
      const wrap=document.getElementById("deadline-wrap");
      const input=document.getElementById("pub-deadline");
      if(!wrap) return;
      const shouldShow=requiresDeadline(selectedType);
      wrap.classList.toggle("hidden",!shouldShow);
      if(!shouldShow&&input) input.value="";
    }

    const TYPE_CONFIG={
      aviso:   {emoji:"📢",label:"Aviso",    pill:"pill-aviso"},
      prova:   {emoji:"📝",label:"Prova",    pill:"pill-prova"},
      trabalho:{emoji:"📁",label:"Trabalho", pill:"pill-trabalho"},
      atividade:{emoji:"📖",label:"Atividade",pill:"pill-atividade"},
    };

    function renderNotices(animate){
      const list=document.getElementById("notices-list");
      const title=document.querySelector(".section-title");
      if(currentFilter==="livros"){
        title.innerHTML=`📚 Livros da semana <span class="count-badge" id="notices-count">${books.length}</span>`;
        if(!books.length){ list.innerHTML=`<div class="empty-state"><span class="emoji">📚</span><p>Nenhum livro necessário.</p></div>`; return; }
        const days=["segunda","terça","quarta","quinta","sexta","sábado","domingo"];
        const grouped={}; days.forEach(d=>grouped[d]=[]); books.forEach(b=>{ if(grouped[b.day_of_week]) grouped[b.day_of_week].push(b); });
        Object.keys(grouped).forEach(day=>{ grouped[day].sort((a,b)=>a.subject.localeCompare(b.subject,'pt-BR')); });
        list.innerHTML=days.filter(day=>grouped[day].length>0).map(day=>`
          <div class="notice-card glass" style="margin-bottom:14px;padding:20px">
            <div style="font-size:14px;font-weight:800;color:var(--purple2);margin-bottom:14px">📅 ${capitalizeDay(day)}</div>
            <div>${grouped[day].map(b=>`<div style="padding:8px 0;font-size:13px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;gap:12px">
              <span style="color:var(--purple2);font-weight:700;min-width:80px">${esc(b.subject)}:</span>
              <span>${esc(b.book_name)}</span></div>`).join("")}</div>
          </div>`).join("");
        return;
      }
      const filtered=currentFilter==="todos"?notices:notices.filter(n=>n.type===currentFilter);
      title.innerHTML=`📋 Mural da Turma <span class="count-badge" id="notices-count">${filtered.length}</span>`;
      list.classList.toggle("panel-slide-in",animate); if(animate) list.offsetHeight;
      if(!filtered.length){ list.innerHTML=`<div class="empty-state"><span class="emoji">📭</span><p>Nenhuma publicação aqui ainda.</p></div>`; return; }
      list.innerHTML=filtered.map((n,i)=>{
        const cfg=TYPE_CONFIG[n.type]||TYPE_CONFIG.aviso;
        const rel=relativeTime(new Date(n.created_at));
        const dueDateIso=normalizeDateIso(n.due_date);
        const deadlineText=dueDateIso?formatDatePtBr(dueDateIso):"";
        const deadlineInfo=dueDateIso?`<div class="notice-deadline ${isPastDue(dueDateIso)?"overdue":""}">⏳ Término: ${deadlineText}</div>`:"";
        const delay=animate?`animation-delay:${i*.07}s`:"animation:none";
        const admin=currentUser?.isAdmin?`<button class="btn btn-ghost btn-sm" onclick="openEdit('${n.id}')">✏️ <span>Editar</span></button><button class="btn btn-danger btn-sm" onclick="deleteNotice('${n.id}')">🗑 <span>Excluir</span></button>`:"";
        const done=n.type==='atividade'&&isActivityDone(n.id);
        const doneBadge=done?`<span class="notice-type-pill" style="background:rgba(16,185,129,.1);color:#10b981;border-color:rgba(16,185,129,.25);">✔️ Concluída</span>`:'';
        const activityToggle=n.type==='atividade'?`<label class="activity-marker ${done?'done':''}"><input type="checkbox" ${done?'checked':''} onchange="toggleActivityDone('${n.id}', this)" /><span>${done?'Você concluiu esta atividade':'Marcar atividade como concluída'}</span></label>`:'';
        return `<div class="notice-card glass card-enter ${done?'done-activity':''}" data-id="${n.id}" style="${delay}">
          <div class="notice-header">
            <div>
              <div class="notice-meta">
                <span class="notice-author">${esc(n.author)}</span>
                <span class="notice-time">${rel}</span>
                ${n.edited?'<span style="font-size:10px;color:var(--muted)">(editado)</span>':""}
              </div>
              <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">
                <span class="notice-type-pill ${cfg.pill}">${cfg.emoji} ${cfg.label}</span>${doneBadge}
              </div>
            </div>
            <div class="notice-actions">${admin}</div>
          </div>
          <div class="notice-body">${esc(n.text).replace(/\n/g,"<br>")}</div>
          ${deadlineInfo}${activityToggle}
        </div>`;
      }).join("");
    }

    function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
    function capitalizeDay(day){ return day.charAt(0).toUpperCase()+day.slice(1); }
    function relativeTime(d){ const diff=Date.now()-d.getTime(),m=Math.floor(diff/60000),h=Math.floor(m/60),dy=Math.floor(h/24); if(m<1)return"agora mesmo"; if(m<60)return`há ${m} min`; if(h<24)return`há ${h}h`; if(dy<7)return`há ${dy} dia${dy>1?"s":""}`; return d.toLocaleDateString("pt-BR"); }
    function normalizeDateIso(value){ if(!value||typeof value!=="string") return ""; const iso=value.slice(0,10); return /^\d{4}-\d{2}-\d{2}$/.test(iso)?iso:""; }
    function formatDatePtBr(isoDate){ const [y,m,d]=isoDate.split("-"); return `${d}/${m}/${y}`; }
    function getTodayIso(){ const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}-${String(n.getDate()).padStart(2,"0")}`; }
    function isPastDue(isoDate){ return isoDate<getTodayIso(); }

    let toastTimer;
    function toast(msg){ const el=document.getElementById("toast"); el.textContent=msg; el.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove("show"),3200); }
    function setBtnLoading(id,loading,label){ const btn=document.getElementById(id); if(!btn) return; btn.disabled=loading; btn.textContent=label; btn.style.opacity=loading?".7":"1"; }
    function setConnBadge(online){ /* badge removed */ }

    document.addEventListener("DOMContentLoaded",()=>{
      document.querySelector("#tab-login .btn-primary").id="login-btn";
      document.querySelector("#tab-register .btn-primary").id="reg-btn";
      toggleDeadlineInput();
    });
    document.getElementById("edit-modal").addEventListener("click",function(e){ if(e.target===this) closeModal(); });
  </script>
</body>
</html>
