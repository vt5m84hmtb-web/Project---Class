<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Turma Connect</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060410;
      --glass: rgba(20, 10, 50, 0.55);
      --glass2: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --border-h: rgba(160,100,255,0.55);
      --purple: #8b5cf6;
      --purple2: #a78bfa;
      --purple3: #c084fc;
      --text: #ede9f8;
      --muted: #6b5f8a;
      --danger: #f43f5e;
      --glow: 0 0 60px rgba(139,92,246,0.3);
      --card-r: 22px;
    }

    html, body {
      height: 100%;
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    #bg-video {
      position: fixed; inset: 0; width: 100%; height: 100%;
      object-fit: cover; z-index: 0; opacity: 0.45;
      filter: saturate(1.4) hue-rotate(10deg);
    }
    #bg-overlay {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 80%, rgba(80,20,180,0.35) 0%, rgba(6,4,16,0.85) 70%);
      z-index: 1;
    }

    #particles { position: fixed; inset: 0; pointer-events: none; z-index: 2; overflow: hidden; width: 100vw; height: 100vh; }
    .particle { position: absolute; border-radius: 50%; background: rgba(160,100,255,0.6); animation: particleDrift linear infinite; }
    @keyframes particleDrift {
      0%   { transform: translateY(110vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.5; }
      100% { transform: translateY(-30px) scale(1); opacity: 0; }
    }

    .glass {
      background: var(--glass);
      backdrop-filter: blur(28px) saturate(1.5);
      -webkit-backdrop-filter: blur(28px) saturate(1.5);
      border: 1px solid rgba(160,100,255,0.18);
      border-radius: var(--card-r);
      box-shadow: var(--glow), inset 0 1px 0 rgba(255,255,255,0.07), 0 30px 80px rgba(0,0,0,0.5);
    }

    .hidden { display: none !important; }

    /* SVG icon helper */
    .icon { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .icon svg { display: block; }

    .input {
      width: 100%; padding: 14px 18px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; color: var(--text); font-family: 'Sora', sans-serif;
      font-size: 14px; outline: none; margin-bottom: 14px;
      transition: all 0.35s cubic-bezier(.34,1.2,.64,1);
    }
    .input:focus {
      border-color: var(--border-h); background: rgba(139,92,246,0.1);
      box-shadow: 0 0 0 3px rgba(139,92,246,0.15), 0 0 20px rgba(139,92,246,0.1);
      transform: translateY(-1px);
    }
    .input::placeholder { color: var(--muted); }
    textarea.input { resize: vertical; min-height: 90px; }

    .btn {
      padding: 14px 24px; border: none; border-radius: 12px;
      font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 700;
      cursor: pointer; letter-spacing: 0.5px;
      transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
      position: relative; overflow: hidden;
      display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    }
    .btn::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.2) 50%, transparent 70%);
      transform: translateX(-100%); transition: transform 0.6s;
    }
    .btn:hover::after { transform: translateX(100%); }
    .btn-primary {
      background: linear-gradient(135deg, #9333ea, #6d28d9, #7c3aed);
      background-size: 200% auto; color: #fff;
      box-shadow: 0 4px 25px rgba(139,92,246,0.45), inset 0 1px 0 rgba(255,255,255,0.15);
      animation: gradShiftBtn 4s linear infinite;
    }
    @keyframes gradShiftBtn { 0%{background-position:0% center;} 100%{background-position:200% center;} }
    .btn-primary:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 10px 40px rgba(139,92,246,0.65), inset 0 1px 0 rgba(255,255,255,0.15); }
    .btn-ghost { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text); }
    .btn-ghost:hover { border-color: var(--border-h); background: rgba(139,92,246,0.08); transform: translateY(-1px); }
    .btn-danger { background: rgba(244,63,94,0.1); border: 1px solid rgba(244,63,94,0.25); color: var(--danger); }
    .btn-danger:hover { background: rgba(244,63,94,0.2); transform: translateY(-1px); }
    .btn-sm { padding: 7px 14px; font-size: 12px; border-radius: 9px; }
    .btn-full { width: 100%; }
    .btn:active { transform: scale(0.95) !important; }
    .label { font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 7px; display: block; letter-spacing: 0.5px; text-transform: uppercase; }

    #toast {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(120px);
      background: rgba(25,12,55,0.97); border: 1px solid rgba(160,100,255,0.4);
      color: var(--text); padding: 13px 28px; border-radius: 14px;
      font-size: 13px; font-weight: 500; z-index: 9999;
      transition: transform 0.45s cubic-bezier(.34,1.56,.64,1), opacity 0.3s;
      backdrop-filter: blur(20px); white-space: nowrap;
      box-shadow: 0 0 40px rgba(139,92,246,0.35); opacity: 0;
      display: flex; align-items: center; gap: 8px;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px); z-index: 100;
      display: flex; align-items: center; justify-content: center; padding: 20px;
      animation: fadeBg .25s ease;
    }
    .modal { width: 100%; max-width: 430px; padding: 30px; animation: modalPop .4s cubic-bezier(.34,1.56,.64,1); }
    .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    @keyframes fadeBg { from{opacity:0;} to{opacity:1;} }
    @keyframes modalPop { from{opacity:0;transform:scale(.8) translateY(30px);} to{opacity:1;transform:scale(1) translateY(0);} }

    #page-auth {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px; position: relative; z-index: 3;
    }
    .auth-card { width: 100%; max-width: 400px; padding: 44px 38px; animation: authCardIn 0.9s cubic-bezier(.34,1.2,.64,1) both; position: relative; }
    .auth-card::before {
      content: ''; position: absolute; inset: -1px;
      border-radius: calc(var(--card-r) + 1px);
      background: linear-gradient(135deg, rgba(160,100,255,0.4), transparent 40%, rgba(100,50,200,0.3));
      z-index: -1; animation: borderGlow 4s ease-in-out infinite;
    }
    @keyframes borderGlow { 0%,100%{opacity:0.6;} 50%{opacity:1;} }
    @keyframes authCardIn { from{opacity:0;transform:translateY(60px) scale(0.9);} to{opacity:1;transform:translateY(0) scale(1);} }

    .auth-logo { text-align: center; margin-bottom: 10px; height: 180px; position: relative; }
    .logo-img {
      width: 380px; height: auto; max-width: none; pointer-events: none;
      display: block; position: relative; top: 50%; left: 48%;
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 0 28px rgba(100,120,255,0.7));
      animation: logoFloat 3.5s ease-in-out infinite;
    }
    @keyframes logoFloat {
      0%,100%{transform:translate(-50%,-50%) translateY(0) scale(1);filter:drop-shadow(0 0 28px rgba(100,120,255,0.7));}
      50%{transform:translate(-50%,-50%) translateY(-8px) scale(1.04);filter:drop-shadow(0 0 42px rgba(140,100,255,0.95));}
    }
    .auth-logo p { font-size: 13px; color: var(--muted); margin-top: 4px; font-weight: 400; }

    .auth-tabs {
      display: flex; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px; padding: 4px; margin-bottom: 28px; gap: 4px;
    }
    .auth-tab {
      flex: 1; padding: 10px; border: none; border-radius: 10px;
      background: transparent; color: var(--muted); font-family: 'Sora', sans-serif;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.35s cubic-bezier(.34,1.36,.64,1);
    }
    .auth-tab.active { background: linear-gradient(135deg, #7c3aed, #6d28d9); color: #fff; box-shadow: 0 2px 18px rgba(139,92,246,0.5); transform: scale(1.02); }

    .auth-form-panel { display: none; flex-direction: column; gap: 6px; }
    .auth-form-panel.active { display: flex; animation: panelSlide .4s cubic-bezier(.34,1.2,.64,1); }
    @keyframes panelSlide { from{opacity:0;transform:translateX(20px);} to{opacity:1;transform:translateX(0);} }
    .auth-form-panel.active > * { animation: fadeUp .4s both; }
    .auth-form-panel.active > *:nth-child(1){animation-delay:.05s}
    .auth-form-panel.active > *:nth-child(2){animation-delay:.12s}
    .auth-form-panel.active > *:nth-child(3){animation-delay:.19s}
    .auth-form-panel.active > *:nth-child(4){animation-delay:.26s}
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px);} to{opacity:1;transform:translateY(0);} }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 12px; color: var(--muted); display: flex; align-items: center; justify-content: center; gap: 6px; }

    #page-dashboard { min-height: 100vh; position: relative; z-index: 3; max-width: 780px; margin: 0 auto; padding: 0 16px 100px; }
    #page-dashboard.entering { animation: dashIn .7s cubic-bezier(.34,1.2,.64,1) both; }
    @keyframes dashIn { from{opacity:0;transform:translateY(30px);} to{opacity:1;transform:translateY(0);} }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 0 16px; border-bottom: 1px solid rgba(139,92,246,0.15);
      margin-bottom: 26px; gap: 12px; animation: fadeDown .5s .1s both;
    }
    @keyframes fadeDown { from{opacity:0;transform:translateY(-14px);} to{opacity:1;transform:translateY(0);} }
    .topbar-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
    .topbar-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, #9333ea, #6d28d9);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; font-weight: 800; flex-shrink: 0;
      box-shadow: 0 0 0 2px rgba(139,92,246,0.4);
      animation: avatarPulse 3s ease-in-out infinite; cursor: default; transition: transform 0.3s;
    }
    .topbar-avatar:hover { transform: scale(1.12) rotate(8deg); }
    @keyframes avatarPulse { 0%,100%{box-shadow:0 0 0 2px rgba(139,92,246,0.4);} 50%{box-shadow:0 0 0 6px rgba(139,92,246,0.1),0 0 20px rgba(139,92,246,0.3);} }
    .topbar-name { font-size: 15px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .topbar-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .logout-btn {
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      color: var(--muted); padding: 9px 16px; border-radius: 10px; cursor: pointer;
      font-size: 12px; font-family: 'Sora', sans-serif; font-weight: 600; transition: all 0.25s;
      display: flex; align-items: center; gap: 6px;
    }
    .logout-btn:hover { border-color: var(--border-h); color: var(--text); transform: translateY(-1px); }

    .notification-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 22px; height: 22px; border-radius: 50%;
      background: linear-gradient(135deg, #f43f5e, #e11d48);
      color: #fff; font-size: 10px; font-weight: 700;
      box-shadow: 0 0 12px rgba(244,63,94,0.5);
      animation: notifPulse 2s ease-in-out infinite;
    }
    @keyframes notifPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.15);} }

    .sort-indicator {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 10px; color: var(--muted); background: rgba(139,92,246,0.08);
      border: 1px solid rgba(139,92,246,0.2); padding: 3px 10px;
      border-radius: 999px; margin-left: 8px; font-weight: 600;
      letter-spacing: 0.3px;
    }

    .urgency-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 999px; font-size: 10px; font-weight: 700;
      letter-spacing: 0.4px; text-transform: uppercase;
    }
    .urgency-today    { background: rgba(244,63,94,0.15); color: #fb7185; border: 1px solid rgba(244,63,94,0.35); animation: urgencyPulse 1.5s ease-in-out infinite; }
    .urgency-soon     { background: rgba(251,191,36,0.12); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
    .urgency-upcoming { background: rgba(99,102,241,0.1); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.25); }
    @keyframes urgencyPulse { 0%,100%{box-shadow:none;} 50%{box-shadow:0 0 10px rgba(244,63,94,0.4);} }

    .publish-card { padding: 24px; margin-bottom: 26px; animation: fadeUp .5s .2s both; transition: box-shadow .3s; }
    .publish-card:focus-within { box-shadow: 0 0 0 1px rgba(139,92,246,0.4), var(--glow), inset 0 1px 0 rgba(255,255,255,0.08); }
    .publish-card h3 { font-size: 14px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; letter-spacing: 0.3px; }

    .type-selector { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .type-chip {
      padding: 6px 14px; border-radius: 999px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border); background: transparent;
      color: var(--muted); font-family: 'Sora', sans-serif;
      transition: all .3s cubic-bezier(.34,1.36,.64,1);
      display: inline-flex; align-items: center; gap: 6px;
    }
    .type-chip:hover { transform: translateY(-2px); border-color: var(--border-h); color: var(--text); }
    .type-chip.active { background: rgba(139,92,246,0.2); border-color: rgba(160,100,255,0.5); color: var(--purple2); transform: translateY(-2px) scale(1.04); box-shadow: 0 4px 16px rgba(139,92,246,0.25); }

    .publish-actions { display: flex; gap: 10px; margin-top: 14px; }

    .filter-bar { display: flex; gap: 8px; margin-bottom: 22px; flex-wrap: wrap; animation: fadeUp .5s .3s both; }
    .filter-chip {
      padding: 7px 16px; border-radius: 999px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border); background: transparent;
      color: var(--muted); font-family: 'Sora', sans-serif;
      transition: all .3s cubic-bezier(.34,1.36,.64,1); animation: fadeUp .4s both;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .filter-chip:nth-child(1){animation-delay:.05s} .filter-chip:nth-child(2){animation-delay:.10s}
    .filter-chip:nth-child(3){animation-delay:.15s} .filter-chip:nth-child(4){animation-delay:.20s}
    .filter-chip:nth-child(5){animation-delay:.25s} .filter-chip:nth-child(6){animation-delay:.30s}
    .filter-chip:hover { transform: translateY(-2px); border-color: var(--border-h); color: var(--text); }
    .filter-chip.active { background: rgba(139,92,246,0.18); border-color: rgba(160,100,255,0.45); color: var(--purple2); transform: translateY(-2px); box-shadow: 0 4px 14px rgba(139,92,246,0.22); }

    #notices-list { display: flex; flex-direction: column; gap: 14px; }
    .notice-card {
      padding: 22px; position: relative; overflow: hidden;
      transition: border-color .3s, transform .3s, box-shadow .3s; cursor: default;
    }
    .notice-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: linear-gradient(180deg, var(--purple3), #6d28d9);
      opacity: 0; transition: opacity .3s; border-radius: 3px 0 0 3px;
    }
    .notice-card:hover { border-color: rgba(160,100,255,0.35); transform: translateY(-3px); box-shadow: 0 12px 40px rgba(139,92,246,0.2), inset 0 1px 0 rgba(255,255,255,0.08); }
    .notice-card:hover::before { opacity: 1; }
    .notice-card.card-enter { animation: cardEnter .5s cubic-bezier(.34,1.2,.64,1) both; }
    @keyframes cardEnter { from{opacity:0;transform:translateY(24px) scale(.96);} to{opacity:1;transform:translateY(0) scale(1);} }
    .notice-card.card-exit { animation: cardExit .3s ease forwards; }
    @keyframes cardExit { to{opacity:0;transform:scale(.93) translateY(-10px);max-height:0;padding:0;margin:0;} }
    .notice-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
    .notice-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .notice-author { font-size: 12px; font-weight: 700; color: var(--purple2); text-transform: uppercase; letter-spacing: 0.5px; }
    .notice-time { font-size: 11px; color: var(--muted); }
    .notice-type-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 999px; font-size: 10px; font-weight: 700;
      letter-spacing: 0.6px; text-transform: uppercase; margin-top: 6px; transition: transform .2s;
    }
    .notice-card:hover .notice-type-pill { transform: scale(1.06); }
    .pill-aviso    { background: rgba(251,191,36,.1); color: #fbbf24; border: 1px solid rgba(251,191,36,.25); }
    .pill-prova    { background: rgba(244,63,94,.1); color: #f43f5e; border: 1px solid rgba(244,63,94,.25); }
    .pill-trabalho { background: rgba(34,197,94,.1); color: #22c55e; border: 1px solid rgba(34,197,94,.25); }
    .pill-atividade{ background: rgba(139,92,246,.1); color: var(--purple2); border: 1px solid rgba(139,92,246,.25); }
    .notice-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .notice-body { font-size: 14px; line-height: 1.7; color: #ccc4e0; }

    .books-table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 13px; }
    .books-table th, .books-table td { padding: 11px 14px; border-bottom: 1px solid rgba(255,255,255,0.07); text-align: left; }
    .books-table th { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .08em; font-weight: 600; }
    .books-table tbody tr:hover { background: rgba(255,255,255,.03); }

    .publish-deadline { margin-top: 12px; }
    .notice-deadline {
      margin-top: 10px; font-size: 11px; color: var(--text);
      display: inline-flex; align-items: center; gap: 6px; padding: 4px 11px;
      border: 1px solid var(--border); border-radius: 999px; background: rgba(255,255,255,0.04);
    }
    .notice-deadline.overdue { color: #fca5a5; border-color: rgba(244,63,94,.35); background: rgba(244,63,94,.1); }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); animation: fadeUp .5s both; }
    .empty-state .es-icon { margin: 0 auto 14px; display: flex; justify-content: center; opacity: 0.45; animation: emptyBounce 2.5s ease-in-out infinite; }
    @keyframes emptyBounce { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-12px);} }
    .empty-state p { font-size: 14px; }

    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; margin-top: 32px; gap: 10px; animation: fadeUp .5s .25s both; }
    .section-title { font-size: 17px; font-weight: 800; display: flex; align-items: center; gap: 8px; letter-spacing: -0.3px; }
    .count-badge { background: rgba(139,92,246,0.2); color: var(--purple2); padding: 2px 9px; border-radius: 999px; font-size: 11px; font-weight: 700; }
    .count-badge.bump { animation: badgeBump .4s cubic-bezier(.34,1.56,.64,1); }
    @keyframes badgeBump { 0%{transform:scale(1);} 40%{transform:scale(1.5);} 100%{transform:scale(1);} }

    .suggestions-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 10px; }

    .activity-marker {
      display: flex; align-items: center; gap: 12px; margin-top: 16px;
      font-size: 13px; color: var(--text); border: 1px solid rgba(139,92,246,0.18);
      background: rgba(255,255,255,0.03); padding: 12px 14px; border-radius: 12px;
      transition: background .2s, border-color .2s;
    }
    .activity-marker input { width: 18px; height: 18px; accent-color: var(--purple); cursor: pointer; flex-shrink: 0; }
    .activity-marker span { font-weight: 600; line-height: 1.3; }
    .activity-marker.done { border-color: rgba(16,185,129,.35); background: rgba(16,185,129,.1); color: #a7f3d0; }
    .notice-card.done-activity { border-color: rgba(16,185,129,.35); }
    .notice-card.done-activity .notice-type-pill { background: rgba(16,185,129,.1); color: #10b981; border-color: rgba(16,185,129,.25); }

    .ripple { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.2); transform: scale(0); animation: rippleAnim .6s linear; pointer-events: none; }
    @keyframes rippleAnim { to{transform:scale(4);opacity:0;} }

    .confetti-particle {
      position: fixed; width: 8px; height: 8px; border-radius: 2px;
      pointer-events: none; z-index: 9999;
      animation: confettiFly var(--dur, 1s) var(--delay, 0s) cubic-bezier(.23,1,.32,1) both;
    }
    @keyframes confettiFly {
      0%{transform:translate(0,0) rotate(0deg) scale(1);opacity:1;}
      80%{opacity:1;}
      100%{transform:translate(var(--tx,0px),var(--ty,120px)) rotate(var(--rot,360deg)) scale(0.4);opacity:0;}
    }

    .notice-card.completing { animation: cardComplete .5s cubic-bezier(.34,1.56,.64,1) both !important; }
    @keyframes cardComplete { 0%{transform:scale(1);} 35%{transform:scale(1.035) translateY(-3px);box-shadow:0 0 0 2px rgba(16,185,129,.5),0 12px 40px rgba(16,185,129,.25);} 100%{transform:scale(1) translateY(0);} }
    .activity-marker input[type=checkbox] { transition: transform .2s cubic-bezier(.34,1.56,.64,1); }
    .activity-marker input[type=checkbox]:checked { animation: checkPop .4s cubic-bezier(.34,1.56,.64,1); }
    @keyframes checkPop { 0%{transform:scale(1);} 40%{transform:scale(1.6) rotate(-10deg);} 100%{transform:scale(1) rotate(0);} }

    .done-banner {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff; font-family: 'Sora', sans-serif;
      font-size: 22px; font-weight: 800; padding: 18px 40px;
      border-radius: 18px; box-shadow: 0 0 60px rgba(16,185,129,.5);
      z-index: 9999; pointer-events: none; letter-spacing: 0.5px;
      display: flex; align-items: center; gap: 10px;
      animation: bannerPop .7s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes bannerPop {
      0%{transform:translate(-50%,-50%) scale(0) rotate(-8deg);opacity:0;}
      50%{transform:translate(-50%,-50%) scale(1.08) rotate(2deg);opacity:1;}
      70%{transform:translate(-50%,-50%) scale(1) rotate(0);opacity:1;}
      100%{transform:translate(-50%,-50%) scale(1) rotate(0);opacity:1;}
    }

    .skeleton { background: linear-gradient(90deg,rgba(255,255,255,.03) 25%,rgba(255,255,255,.09) 50%,rgba(255,255,255,.03) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
    @keyframes shimmer { from{background-position:200% 0;} to{background-position:-200% 0;} }

    @keyframes shake { 0%,100%{transform:translateX(0) scale(1);} 20%{transform:translateX(-9px) scale(1.01);} 40%{transform:translateX(9px);} 60%{transform:translateX(-5px);} 80%{transform:translateX(5px);} }
    @keyframes authOut { to{opacity:0;transform:scale(.94) translateY(-12px);} }

    .admin-tabs { display: flex; background: rgba(0,0,0,0.35); border: 1px solid var(--border); border-radius: 14px; padding: 4px; margin-bottom: 24px; gap: 4px; }
    .admin-tab {
      flex: 1; padding: 10px; border: none; border-radius: 12px; background: transparent;
      color: var(--muted); font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all .3s cubic-bezier(.34,1.36,.64,1);
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .admin-tab.active { background: linear-gradient(135deg, #7c3aed, #6d28d9); color: #fff; box-shadow: 0 2px 16px rgba(139,92,246,0.45); transform: scale(1.02); }
    .admin-form-panel { display: none; }
    .admin-form-panel.active { display: block; animation: panelSlide .4s cubic-bezier(.34,1.2,.64,1) both; }
    .panel-slide-in { animation: panelSlide .35s cubic-bezier(.34,1.2,.64,1) both; }

    @media(max-width:480px){
      .auth-card { padding: 28px 20px; }
      .publish-actions { flex-direction: column; }
      .notice-actions .btn-sm span { display: none; }
      .filter-bar { gap: 6px; }
      .filter-chip { padding: 6px 12px; font-size: 11px; }
      #page-dashboard { padding: 0 12px 100px; }
      .topbar { padding: 16px 0 12px; }
    }
    @media(max-width:768px){ #bg-video{opacity:0.5;} .particle{opacity:0.7 !important;} }
  </style>
</head>

<body>
  <img id="bg-video" src="Video_para_o_fundo.gif" alt="" />

  <!-- ══ AUTH ══ -->
  <div id="page-auth">
    <div class="auth-card glass">
      <div class="auth-logo">
        <img src="Logo.png" alt="Logo da turma" class="logo-img" />
      </div>
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Entrar</button>
        <button class="auth-tab" onclick="switchTab('register')">Criar conta</button>
      </div>
      <div id="tab-login" class="auth-form-panel active">
        <div>
          <label class="label">Nome</label>
          <input id="login-name" class="input" type="text" placeholder="Seu nome" autocomplete="username" />
        </div>
        <div>
          <label class="label">Senha</label>
          <input id="login-pass" class="input" type="password" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <button class="btn btn-primary btn-full" onclick="doLogin()">Entrar</button>
      </div>
      <div id="tab-register" class="auth-form-panel">
        <div>
          <label class="label">Escolha um nome</label>
          <input id="reg-name" class="input" type="text" placeholder="Seu nome" />
        </div>
        <div>
          <label class="label">Crie uma senha</label>
          <input id="reg-pass" class="input" type="password" placeholder="Mínimo 4 caracteres" />
        </div>
        <div>
          <label class="label">Confirme a senha</label>
          <input id="reg-pass2" class="input" type="password" placeholder="Repita a senha" />
        </div>
        <button class="btn btn-primary btn-full" onclick="doRegister()">Criar conta</button>
      </div>
      <div class="auth-footer">
        <svg width="12" height="12" style="color:var(--muted)"><use href="#ic-lock"/></svg>
        Apenas membros da turma têm acesso
      </div>
    </div>
  </div>

  <!-- ══ DASHBOARD ══ -->
  <div id="page-dashboard" class="hidden">
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-avatar" id="dash-avatar">?</div>
        <div>
          <div class="topbar-name" id="dash-name">—</div>
          <div class="topbar-sub" id="dash-role">Aluno</div>
        </div>
      </div>
      <button class="logout-btn" onclick="doLogout()">
        <svg width="13" height="13"><use href="#ic-logout"/></svg>
        Sair
      </button>
    </div>

    <!-- Sugestões -->
    <div id="suggestions-header-panel" class="glass hidden" style="padding:18px;margin-bottom:22px;border-radius:16px">
      <div class="suggestions-header">
        <div style="display:flex;align-items:center;gap:8px">
          <svg width="15" height="15" style="color:#fbbf24"><use href="#ic-lightbulb"/></svg>
          <h3 style="font-size:13px;font-weight:700;margin:0;letter-spacing:0.3px">Sugestões &amp; Melhorias</h3>
          <span id="notification-badge" class="notification-badge hidden">0</span>
        </div>
        <button id="toggle-suggestions" class="btn btn-ghost btn-sm" onclick="toggleSuggestionsPanel()">
          <svg width="12" height="12"><use href="#ic-eye"/></svg>
          Ver
        </button>
      </div>
      <div id="suggestions-panel-content" style="display:none">
        <textarea id="suggestion-text" class="input" placeholder="Deixe sua sugestão para melhorar o site..." style="margin-bottom:10px;min-height:70px"></textarea>
        <div class="publish-actions">
          <button id="suggest-btn" class="btn btn-primary btn-sm" style="flex:1" onclick="submitSuggestion()">
            <svg width="12" height="12"><use href="#ic-send"/></svg>
            Enviar Sugestão
          </button>
        </div>
        <div id="suggestions-list" style="margin-top:14px"></div>
      </div>
    </div>

    <!-- Admin panel -->
    <div id="admin-panel" class="glass hidden" style="padding:24px;margin-bottom:26px">
      <div class="admin-tabs">
        <button class="admin-tab active" onclick="switchAdminTab('publish')">
          <svg width="13" height="13"><use href="#ic-pencil"/></svg>
          Publicar
        </button>
        <button class="admin-tab" onclick="switchAdminTab('books')">
          <svg width="13" height="13"><use href="#ic-book"/></svg>
          Livros
        </button>
      </div>
      <div id="tab-publish" class="admin-form-panel active">
        <div class="publish-card" style="padding:0;margin:0">
          <h3>
            <svg width="15" height="15" style="color:var(--purple2)"><use href="#ic-pencil"/></svg>
            Publicar aviso, prova ou atividade
          </h3>
          <div class="type-selector">
            <button class="type-chip active" data-type="aviso" onclick="selectType(this)">
              <svg width="11" height="11"><use href="#ic-megaphone"/></svg>
              Avisos
            </button>
            <button class="type-chip" data-type="prova" onclick="selectType(this)">
              <svg width="11" height="11"><use href="#ic-file-text"/></svg>
              Provas
            </button>
            <button class="type-chip" data-type="trabalho" onclick="selectType(this)">
              <svg width="11" height="11"><use href="#ic-folder"/></svg>
              Trabalhos
            </button>
            <button class="type-chip" data-type="atividade" onclick="selectType(this)">
              <svg width="11" height="11"><use href="#ic-book-open"/></svg>
              Atividades
            </button>
          </div>
          <textarea id="pub-text" class="input" placeholder="Digite o conteúdo..."></textarea>
          <div id="deadline-wrap" class="publish-deadline hidden">
            <label class="label" for="pub-deadline">Data de término</label>
            <input id="pub-deadline" class="input" type="date" />
          </div>
          <div class="publish-actions">
            <button id="pub-btn" class="btn btn-primary" style="flex:1" onclick="publishNotice()">Publicar</button>
            <button class="btn btn-ghost" onclick="clearPublish()">Limpar</button>
          </div>
        </div>
      </div>
      <div id="tab-books" class="admin-form-panel">
        <div class="publish-card" style="padding:0;margin:0">
          <h3>
            <svg width="15" height="15" style="color:var(--purple2)"><use href="#ic-book"/></svg>
            Gerenciar Livros da Semana
          </h3>
          <select id="book-day" class="input">
            <option value="segunda">Segunda-feira</option>
            <option value="terça">Terça-feira</option>
            <option value="quarta">Quarta-feira</option>
            <option value="quinta">Quinta-feira</option>
            <option value="sexta">Sexta-feira</option>
            <option value="sábado">Sábado</option>
            <option value="domingo">Domingo</option>
          </select>
          <input id="book-subject" class="input" placeholder="Matéria (ex: Biologia)" />
          <input id="book-name" class="input" placeholder="Nome do Livro" />
          <div class="publish-actions">
            <button id="add-book-btn" class="btn btn-primary" onclick="addBook()">
              <svg width="13" height="13"><use href="#ic-plus"/></svg>
              Adicionar Livro
            </button>
          </div>
          <div id="current-books"></div>
        </div>
      </div>
    </div>

    <div class="section-header">
      <div class="section-title" id="section-title-el">
        <svg width="17" height="17" style="color:var(--purple2)"><use href="#ic-layout"/></svg>
        Mural da Turma
        <span class="count-badge" id="notices-count">0</span>
      </div>
    </div>
    <div class="filter-bar">
      <button class="filter-chip active" data-filter="todos" onclick="setFilter(this)">Todos</button>
      <button class="filter-chip" data-filter="aviso" onclick="setFilter(this)">
        <svg width="11" height="11"><use href="#ic-megaphone"/></svg>
        Avisos
      </button>
      <button class="filter-chip" data-filter="prova" onclick="setFilter(this)">
        <svg width="11" height="11"><use href="#ic-file-text"/></svg>
        Provas
      </button>
      <button class="filter-chip" data-filter="trabalho" onclick="setFilter(this)">
        <svg width="11" height="11"><use href="#ic-folder"/></svg>
        Trabalhos
      </button>
      <button class="filter-chip" data-filter="atividade" onclick="setFilter(this)">
        <svg width="11" height="11"><use href="#ic-book-open"/></svg>
        Atividades
      </button>
      <button class="filter-chip" data-filter="livros" onclick="setFilter(this)">
        <svg width="11" height="11"><use href="#ic-book"/></svg>
        Livros
      </button>
    </div>
    <div id="notices-list"></div>
  </div>

  <!-- Modal -->
  <div id="edit-modal" class="modal-overlay hidden">
    <div class="modal glass">
      <div class="modal-title">
        <svg width="18" height="18" style="color:var(--purple2)"><use href="#ic-pencil"/></svg>
        Editar publicação
      </div>
      <textarea id="edit-text" class="input" style="min-height:110px;margin-bottom:16px"></textarea>
      <div style="display:flex;gap:10px">
        <button class="btn btn-primary" style="flex:1" onclick="saveEdit()">Salvar</button>
        <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      </div>
    </div>
  </div>

  <script>
    /* SVG icon helper */
    function icon(id, size=13, color='currentColor') {
      return `<svg width="${size}" height="${size}" style="color:${color};flex-shrink:0" aria-hidden="true"><use href="#${id}"/></svg>`;

    const PRIORITY_TYPES = new Set(['prova', 'trabalho', 'atividade']);
    const FAR_FUTURE = '9999-99-99';

    function sortNotices(list) {
      const today = getTodayIso();
      return [...list].sort((a, b) => {
        const aPriority = PRIORITY_TYPES.has(a.type);
        const bPriority = PRIORITY_TYPES.has(b.type);
        if (aPriority !== bPriority) return aPriority ? -1 : 1;
        if (aPriority && bPriority) {
          const aDue = normalizeDateIso(a.due_date) || FAR_FUTURE;
          const bDue = normalizeDateIso(b.due_date) || FAR_FUTURE;
          const aOverdue = aDue < today; const bOverdue = bDue < today;
          if (aOverdue !== bOverdue) return aOverdue ? 1 : -1;
          if (aDue !== bDue) return aDue.localeCompare(bDue);
          return new Date(b.created_at) - new Date(a.created_at);
        }
        return new Date(b.created_at) - new Date(a.created_at);
      });
    }

    function getUrgencyBadge(dueDateIso) {
      if (!dueDateIso) return '';
      const today = getTodayIso();
      const diff = daysUntil(dueDateIso, today);
      if (diff < 0) return '';
      if (diff === 0) return `<span class="urgency-badge urgency-today">${icon('ic-flame',10,'currentColor')} Hoje!</span>`;
      if (diff <= 3) return `<span class="urgency-badge urgency-soon">${icon('ic-timer',10,'currentColor')} ${diff} dia${diff>1?'s':''}</span>`;
      if (diff <= 7) return `<span class="urgency-badge urgency-upcoming">${icon('ic-calendar',10,'currentColor')} ${diff} dias</span>`;
      return '';
    }

    function daysUntil(isoTarget, isoToday) {
      return Math.round((new Date(isoTarget+'T00:00:00') - new Date(isoToday+'T00:00:00')) / 86400000);
    }

      const badge=document.getElementById("notification-badge");
      if(!currentUser?.isAdmin){ badge.classList.add("hidden"); return; }
      if(suggestions.length>0){ badge.classList.remove("hidden"); badge.textContent=suggestions.length>99?"99+":suggestions.length; }
      else badge.classList.add("hidden");
    }

    function toggleSuggestionsPanel(){
      const content=document.getElementById("suggestions-panel-content");
      const btn=document.getElementById("toggle-suggestions");
      const isHidden=content.style.display==="none";
      content.style.display=isHidden?"block":"none";
      btn.innerHTML = isHidden
        ? `${icon('ic-eye-off',12,'currentColor')} Fechar`
        : `${icon('ic-eye',12,'currentColor')} Ver`;
    }

    function toggleDeadlineInput(){
      const wrap=document.getElementById("deadline-wrap");
      const input=document.getElementById("pub-deadline");
      if(!wrap) return;
      const shouldShow=requiresDeadline(selectedType);
      wrap.classList.toggle("hidden",!shouldShow);
      if(!shouldShow&&input) input.value="";
    }

    const TYPE_CONFIG={
      aviso:    {iconId:"ic-megaphone", label:"Aviso",     pill:"pill-aviso",    color:"#fbbf24"},
      prova:    {iconId:"ic-file-text", label:"Prova",     pill:"pill-prova",    color:"#f43f5e"},
      trabalho: {iconId:"ic-folder",    label:"Trabalho",  pill:"pill-trabalho", color:"#22c55e"},
      atividade:{iconId:"ic-book-open", label:"Atividade", pill:"pill-atividade",color:"var(--purple2)"},
    };

    function renderNotices(animate){
      const list=document.getElementById("notices-list");
      const titleEl=document.getElementById("section-title-el");

      if(currentFilter==="livros"){
        titleEl.innerHTML=`${icon('ic-book',17,'var(--purple2)')} Livros da semana <span class="count-badge" id="notices-count">${books.length}</span>`;
        if(!books.length){ list.innerHTML=`<div class="empty-state"><div class="es-icon">${icon('ic-book',42,'var(--muted)')}</div><p>Nenhum livro necessário.</p></div>`; return; }
        const days=["segunda","terça","quarta","quinta","sexta","sábado","domingo"];
        const grouped={}; days.forEach(d=>grouped[d]=[]); books.forEach(b=>{ if(grouped[b.day_of_week]) grouped[b.day_of_week].push(b); });
        Object.keys(grouped).forEach(day=>{ grouped[day].sort((a,b)=>a.subject.localeCompare(b.subject,'pt-BR')); });
        list.innerHTML=days.filter(day=>grouped[day].length>0).map(day=>`
          <div class="notice-card glass" style="margin-bottom:14px;padding:20px">
            <div style="font-size:14px;font-weight:800;color:var(--purple2);margin-bottom:14px;display:flex;align-items:center;gap:7px">
              ${icon('ic-calendar',14,'var(--purple3)')} ${capitalizeDay(day)}
            </div>
            <div>${grouped[day].map(b=>`<div style="padding:8px 0;font-size:13px;border-bottom:1px solid rgba(255,255,255,.05);display:flex;gap:12px">
              <span style="color:var(--purple2);font-weight:700;min-width:80px">${esc(b.subject)}:</span>
              <span>${esc(b.book_name)}</span></div>`).join("")}</div>
          </div>`).join("");
        return;
      }

      const raw = currentFilter==="todos" ? notices : notices.filter(n=>n.type===currentFilter);
      const filtered = sortNotices(raw);
      const hasPriorityItems = filtered.some(n => PRIORITY_TYPES.has(n.type));
      const sortLabel = hasPriorityItems
        ? `<span class="sort-indicator">${icon('ic-arrow-up',10,'currentColor')} Por urgência</span>`
        : `<span class="sort-indicator">${icon('ic-clock',10,'currentColor')} Mais recentes</span>`;

      titleEl.innerHTML=`${icon('ic-layout',17,'var(--purple2)')} Mural da Turma <span class="count-badge" id="notices-count">${filtered.length}</span>${sortLabel}`;
      list.classList.toggle("panel-slide-in",animate); if(animate) list.offsetHeight;
      if(!filtered.length){ list.innerHTML=`<div class="empty-state"><div class="es-icon">${icon('ic-inbox',42,'var(--muted)')}</div><p>Nenhuma publicação aqui ainda.</p></div>`; return; }

      list.innerHTML=filtered.map((n,i)=>{
        const cfg=TYPE_CONFIG[n.type]||TYPE_CONFIG.aviso;
        const rel=relativeTime(new Date(n.created_at));
        const dueDateIso=normalizeDateIso(n.due_date);
        const deadlineText=dueDateIso?formatDatePtBr(dueDateIso):"";
        const deadlineInfo=dueDateIso?`<div class="notice-deadline ${isPastDue(dueDateIso)?"overdue":""}">${icon('ic-timer',11,'currentColor')} Término: ${deadlineText}</div>`:"";
        const urgencyBadge = PRIORITY_TYPES.has(n.type) ? getUrgencyBadge(dueDateIso) : '';
        const delay=animate?`animation-delay:${i*.07}s`:"animation:none";
        const admin=currentUser?.isAdmin
          ? `<button class="btn btn-ghost btn-sm" onclick="openEdit('${n.id}')">${icon('ic-pencil',12,'currentColor')} <span>Editar</span></button><button class="btn btn-danger btn-sm" onclick="deleteNotice('${n.id}')">${icon('ic-trash',12,'currentColor')} <span>Excluir</span></button>`
          : "";
        const done=n.type==='atividade'&&isActivityDone(n.id);
        const doneBadge=done?`<span class="notice-type-pill" style="background:rgba(16,185,129,.1);color:#10b981;border-color:rgba(16,185,129,.25);">${icon('ic-check-circle',10,'currentColor')} Concluída</span>`:'';
        const activityToggle=n.type==='atividade'?`<label class="activity-marker ${done?'done':''}"><input type="checkbox" ${done?'checked':''} onchange="toggleActivityDone('${n.id}', this)" /><span>${done?'Você concluiu esta atividade':'Marcar atividade como concluída'}</span></label>`:'';

        return `<div class="notice-card glass card-enter ${done?'done-activity':''}" data-id="${n.id}" style="${delay}">
          <div class="notice-header">
            <div>
              <div class="notice-meta">
                <span class="notice-author">${esc(n.author)}</span>
                <span class="notice-time">${rel}</span>
                ${n.edited?'<span style="font-size:10px;color:var(--muted)">(editado)</span>':""}
              </div>
              <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:4px">
                <span class="notice-type-pill ${cfg.pill}">${icon(cfg.iconId,10,cfg.color)} ${cfg.label}</span>
                ${doneBadge}
                ${urgencyBadge}
              </div>
            </div>
            <div class="notice-actions">${admin}</div>
          </div>
          <div class="notice-body">${esc(n.text).replace(/\n/g,"<br>")}</div>
          ${deadlineInfo}
          ${activityToggle}
        </div>`;
      }).join("");
    }

    function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
    function capitalizeDay(day){ return day.charAt(0).toUpperCase()+day.slice(1); }
    function relativeTime(d){ const diff=Date.now()-d.getTime(),m=Math.floor(diff/60000),h=Math.floor(m/60),dy=Math.floor(h/24); if(m<1)return"agora mesmo"; if(m<60)return`há ${m} min`; if(h<24)return`há ${h}h`; if(dy<7)return`há ${dy} dia${dy>1?"s":""}`; return d.toLocaleDateString("pt-BR"); }
    function normalizeDateIso(value){ if(!value||typeof value!=="string") return ""; const iso=value.slice(0,10); return /^\d{4}-\d{2}-\d{2}$/.test(iso)?iso:""; }
    function formatDatePtBr(isoDate){ const [y,m,d]=isoDate.split("-"); return `${d}/${m}/${y}`; }
    function getTodayIso(){ const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}-${String(n.getDate()).padStart(2,"0")}`; }
    function isPastDue(isoDate){ return isoDate<getTodayIso(); }

    let toastTimer;
    function toast(msg, iconId=null){
      const el=document.getElementById("toast");
      el.innerHTML=(iconId?icon(iconId,13,'currentColor'):'') + esc(msg);
      el.classList.add("show"); clearTimeout(toastTimer);
      toastTimer=setTimeout(()=>el.classList.remove("show"),3200);
    }
    function setBtnLoading(id,loading,label){ const btn=document.getElementById(id); if(!btn) return; btn.disabled=loading; btn.textContent=label; btn.style.opacity=loading?".7":"1"; }

    document.addEventListener("DOMContentLoaded",()=>{
      document.querySelector("#tab-login .btn-primary").id="login-btn";
      document.querySelector("#tab-register .btn-primary").id="reg-btn";
      toggleDeadlineInput();
    });
    document.getElementById("edit-modal").addEventListener("click",function(e){ if(e.target===this) closeModal(); });
  </script>
</body>
</html>
